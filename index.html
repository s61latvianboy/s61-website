<!DOCTYPE html>
<html lang="lv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Biedrība S61</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

<style>
html,body{
    margin:0;
    height:100%;
    overflow:hidden;
    font-family:Inter,sans-serif;
    background:#05070c;
}

canvas{
    position:fixed;
    inset:0;
    z-index:0;
}

.overlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.45);
    z-index:1;
}

.center{
    position:relative;
    z-index:2;
    height:100%;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:20px;
}

.card{
    width:360px;
    max-width:92vw;
    padding:28px 22px;
    border-radius:24px;

    background:rgba(255,255,255,0.06);
    border:1px solid rgba(255,255,255,0.14);

    backdrop-filter: blur(20px);

    box-shadow:
        0 25px 80px rgba(0,0,0,0.6),
        inset 0 1px 0 rgba(255,255,255,0.1);

    color:white;
    text-align:center;
}

h1{
    margin:0;
    font-size:28px;
    font-weight:600;
}

p{
    margin:6px 0;
    font-size:13px;
    color:rgba(255,255,255,0.75);
}

.contact{
    margin-top:14px;
    font-size:12px;
    color:rgba(255,255,255,0.65);
    line-height:1.6;
}

.whatsapp{
    margin-top:18px;

    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;

    padding:14px 16px;
    border-radius:14px;

    background:#25D366;
    color:white;

    font-weight:600;
    font-size:14px;

    text-decoration:none;

    box-shadow:
        0 0 25px rgba(37,211,102,0.4),
        0 12px 35px rgba(37,211,102,0.25);

    transition:0.2s ease;
}

.whatsapp:hover{
    transform:translateY(-2px) scale(1.02);
    box-shadow:
        0 0 35px rgba(37,211,102,0.6),
        0 15px 45px rgba(37,211,102,0.3);
}

.whatsapp i{
    font-size:18px;
}
</style>
</head>

<body>

<canvas id="c"></canvas>
<div class="overlay"></div>

<div class="center">

    <div class="card">

        <h1>Biedrība S61</h1>

        <p>Stirnu 61 iedzīvotāju biedrība</p>
        <p>Oficiālā WhatsApp komunikācija</p>

        <div class="contact">
            📧 info@s61.lv
        </div>

        <a class="whatsapp"
           href="https://chat.whatsapp.com/KMIymf0CFdz20Qe0Di3RyH"
           target="_blank">

            <i class="fab fa-whatsapp"></i>
            WhatsApp grupa
        </a>

    </div>

</div>

<script>
const c=document.getElementById("c");
const ctx=c.getContext("2d");

function resize(){
    c.width=innerWidth;
    c.height=innerHeight;
}
resize();

let W=c.width, H=c.height;

let pts=[];
for(let i=0;i<170;i++){
    pts.push({
        x:Math.random()*W,
        y:Math.random()*H,
        vx:(Math.random()-0.5)*2.2,
        vy:(Math.random()-0.5)*2.2
    });
}

function draw(){
    ctx.fillStyle="rgba(3,6,12,0.22)";
    ctx.fillRect(0,0,W,H);

    for(let p of pts){
        p.x+=p.vx;
        p.y+=p.vy;

        if(p.x<0||p.x>W) p.vx*=-1;
        if(p.y<0||p.y>H) p.vy*=-1;

        ctx.fillStyle="rgba(34,197,94,1)";
        ctx.fillRect(p.x,p.y,2.2,2.2);
    }

    for(let i=0;i<pts.length;i++){
        for(let j=i+1;j<pts.length;j++){
            let a=pts[i], b=pts[j];
            let dx=a.x-b.x;
            let dy=a.y-b.y;
            let d=Math.sqrt(dx*dx+dy*dy);

            if(d<140){
                ctx.strokeStyle=`rgba(34,197,94,${0.12 - d/1200})`;
                ctx.beginPath();
                ctx.moveTo(a.x,a.y);
                ctx.lineTo(b.x,b.y);
                ctx.stroke();
            }
        }
    }

    requestAnimationFrame(draw);
}

draw();

window.addEventListener("resize",()=>{
    resize();
    W=c.width;
    H=c.height;
});
</script>

</body>
</html>
